name: Monitorear Aspen FM

on:
  workflow_dispatch:  # Se activa solo cuando Pipedream le da la orden cada 5 minutos fijos

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    # 🔑 ESTO ES CLAVE: Le da permiso al bot para modificar y subir archivos de vuelta a tu repo
    permissions:
      contents: write

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Ejecutar Monitoreo
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_PLAYLIST_ID: ${{ secrets.SPOTIFY_PLAYLIST_ID }}
        run: node index.js

      - name: Guardar Cambios de Memoria
        run: |
          git config --global user.name 'Aspen Bot'
          git config --global user.email 'bot@aspen.com'
          touch ultimo_tema.txt
          touch ultima_limpieza.txt
          git add ultimo_tema.txt ultima_limpieza.txt
          # Compara si hubo cambios; si los hay, hace el commit y los sube exitosamente
          git diff --quiet && git diff --cached --quiet || (git commit -m "🤖 Memoria: Actualizar estados de monitoreo [skip ci]" && git push)
